name: no_as_service_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  dio: ^5.4.0
  flutter_card_swiper: ^7.2.0
  dynamic_color: ^1.6.5
  lottie: ^3.3.2
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  m3e_collection: ^0.3.7
  m3e_design: ^0.2.1
  app_bar_m3e: ^0.1.2
  icon_button_m3e: ^0.2.1
  loading_indicator_m3e: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
